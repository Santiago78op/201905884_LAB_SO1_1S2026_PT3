/* Header */
syntax = "proto3";
package wartweets;

/* Option location of the generated code */
option go_package = "./proto";

/* Enums about the countries */
// The convention indicates that enum should be declared before the messages
enum Countries {
  countries_unknown = 0;
  usa = 1;
  rus = 2;
  chn = 3;
  esp = 4;
  gtm = 5;
}

/* WarReportRequest about the war report */
message WarReportRequest {
  Countries country = 1;
  int32 warplanes_in_air = 2;
  int32 warships_in_water = 3;
  string timestamp = 4;
}

/* WarReportResponse about the war report */
message WarReportResponse {
  string status = 1;
}

/* WarReportService about the war report service */
service WarReportService {
  rpc SendReport (WarReportRequest) returns (WarReportResponse);
}