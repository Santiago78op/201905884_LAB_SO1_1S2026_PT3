apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-api
  namespace: military-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-api
  template:
    metadata:
      labels:
        app: rust-api
    spec:
      containers:
        - name: rust-api
          image: 34.68.174.65:5000/rust-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: GRPC_CLIENT_HOST
              value: "go-client:8080"
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: rust-api
  namespace: military-pipeline
spec:
  type: ClusterIP
  selector:
    app: rust-api
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rust-api-hpa
  namespace: military-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rust-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30