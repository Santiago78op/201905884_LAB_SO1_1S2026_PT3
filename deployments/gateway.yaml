apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: gke-l7-global-external-managed
spec:
  controllerName: networking.gke.io/gateway

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rust-api-gateway
  namespace: military-pipeline
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rust-api-route
  namespace: military-pipeline
spec:
  parentRefs:
    - name: rust-api-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grpc-201905884
      backendRefs:
        - name: rust-api
          port: 8080